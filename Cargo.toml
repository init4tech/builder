[package]
name = "builder"
version = "0.1.1"
description = "signet builder example"

edition = "2024"
rust-version = "1.85"
authors = ["init4"]
license = "Apache-2.0 OR MIT"
homepage = "https://github.com/init4tech/builder"
repository = "https://github.com/init4tech/builder"

[lib]
name = "builder"

[[bin]]
name = "zenith-builder-example"
path = "bin/builder.rs"

[[bin]]
name = "transaction-submitter"
path = "bin/submit_transaction.rs"

[features]
integration = []

[dependencies]
init4-bin-base = "0.3"

# signet-constants = { path = "../signet-sdk/crates/constants" }
# signet-sim = { path = "../signet-sdk/crates/sim" }
# signet-tx-cache = { path = "../signet-sdk/crates/tx-cache" }
# signet-types = { path = "../signet-sdk/crates/types" }
# signet-zenith = { path = "../signet-sdk/crates/zenith" }

signet-constants = { git = "https://github.com/init4tech/signet-sdk", branch = "dylan/block-number" }
signet-sim = { git = "https://github.com/init4tech/signet-sdk", branch = "dylan/block-number" }
signet-tx-cache = { git = "https://github.com/init4tech/signet-sdk", branch = "dylan/block-number" }
signet-types = { git = "https://github.com/init4tech/signet-sdk", branch = "dylan/block-number" }
signet-zenith = { git = "https://github.com/init4tech/signet-sdk", branch = "dylan/block-number" }

trevm = { version = "0.20.10", features = ["concurrent-db", "test-utils"] }

alloy = { version = "0.12.6", features = [
    "full",
    "json-rpc",
    "signer-aws",
    "rpc-types-mev",
    "rlp",
    "node-bindings",
    "serde",
] }

aws-config = "1.1.7"
aws-sdk-kms = "1.15.0"

hex = { package = "const-hex", version = "1", default-features = false, features = [
    "alloc",
] }

serde = { version = "1.0.197", features = ["derive"] }

axum = "0.7.5"
eyre = "0.6.12"
openssl = { version = "0.10", features = ["vendored"] }
reqwest = { version = "0.11.24", features = ["blocking", "json"] }
serde_json = "1.0"
thiserror = "1.0.68"
tokio = { version = "1.36.0", features = ["full", "macros", "rt-multi-thread"] }

oauth2 = "5"
tokio-stream = "0.1.17"
url = "2.5.4"
